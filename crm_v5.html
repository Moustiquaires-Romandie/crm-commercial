<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM Commercial</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}

  /* HEADER */
  .header{background:linear-gradient(135deg,#1a56db 0%,#1e40af 100%);padding:16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
  .header-title{font-size:17px;font-weight:700;color:#fff}
  .header-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:1px;display:flex;align-items:center;gap:5px}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#34c759;display:inline-block}
  .sync-dot.loading{background:#ff9500;animation:pulse 1s infinite}
  .sync-dot.error{background:#ff3b30}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .user-badge{background:rgba(255,255,255,.2);color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.3)}

  /* NAV */
  .nav{display:flex;background:#fff;border-bottom:1px solid #e5e5e7;overflow-x:auto}
  .nav-btn{flex:1;padding:12px 4px;font-size:13px;text-align:center;border:none;background:transparent;color:#6e6e73;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;min-width:70px}
  .nav-btn.active{color:#1a56db;border-bottom-color:#1a56db;font-weight:500}

  /* FILTERS */
  .filters{padding:10px 12px;display:flex;gap:6px;overflow-x:auto;background:#f5f5f7}
  .filter-pill{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid #d1d1d6;background:#fff;color:#6e6e73;cursor:pointer;white-space:nowrap;transition:all .15s}
  .filter-pill.active{background:#1a56db;color:#fff;border-color:#1a56db}

  /* CARDS */
  .list{padding:10px 12px}
  .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;border:1px solid #e5e5e7;transition:all .15s;active:opacity:.8}
  .card:active{transform:scale(.99);background:#f5f5f7}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
  .card-name{font-size:15px;font-weight:600}
  .card-co{font-size:13px;color:#6e6e73;margin-top:1px}
  .card-bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .card-action{font-size:12px;color:#6e6e73}
  .card-score{font-size:12px;color:#6e6e73}

  /* BADGES */
  .badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
  .b-Nouveau{background:#e8f0fe;color:#1a56db}
  .b-Contacté{background:#fff3e0;color:#e65100}
  .b-Qualifié{background:#e8f5e9;color:#2e7d32}
  .b-Chaud{background:#fce4ec;color:#c62828}
  .b-Non-qualifié{background:#fafafa;color:#6e6e73;border:1px solid #e5e5e7}

  /* DETAIL */
  .detail{padding:12px;display:none}
  .detail.active{display:block}
  .detail-header{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
  .av-b{background:#e8f0fe;color:#1a56db}
  .av-t{background:#e8f5e9;color:#2e7d32}
  .av-p{background:#ede7f6;color:#5e35b1}
  .av-c{background:#fce4ec;color:#c62828}
  .det-name{font-size:17px;font-weight:600}
  .det-co{font-size:13px;color:#6e6e73;margin-top:2px}
  .section{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px}
  .section-title{font-size:11px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .field-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f2f2f7}
  .field-row:last-child{border-bottom:none}
  .field-label{font-size:13px;color:#6e6e73}
  .field-value{font-size:13px;color:#1d1d1f;text-align:right;max-width:60%}
  .field-value.blue{color:#1a56db}
  select,textarea,input[type=text],input[type=date]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #d1d1d6;background:#f5f5f7;font-size:14px;font-family:inherit;color:#1d1d1f;margin-bottom:10px;appearance:none;-webkit-appearance:none}
  select:focus,textarea:focus,input:focus{outline:none;border-color:#1a56db;background:#fff}
  textarea{min-height:80px;resize:none}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .btn{padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #d1d1d6;background:#fff;color:#1d1d1f;transition:all .15s;text-align:center}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:#1a56db;color:#fff;border-color:#1a56db}
  .btn-primary:active{background:#1648c0}
  .toast{background:#34c759;color:#fff;padding:12px 16px;border-radius:10px;text-align:center;font-size:13px;font-weight:500;margin-top:10px;display:none}
  .toast.error{background:#ff3b30}
  .toast.show{display:block}

  /* STATS */
  .stats{padding:12px;display:none}
  .stats.active{display:block}
  .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .metric{background:#fff;border-radius:12px;padding:14px}
  .metric-num{font-size:26px;font-weight:700}
  .metric-lbl{font-size:12px;color:#6e6e73;margin-top:2px}
  .upcoming-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
  .upcoming-name{font-size:14px;font-weight:500}
  .upcoming-action{font-size:12px;color:#6e6e73;margin-top:2px}

  /* LOADING */
  .loading-screen{padding:40px 20px;text-align:center;color:#6e6e73;font-size:14px}
  .spinner{width:28px;height:28px;border:2px solid #e5e5e7;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* USER MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:14px}
  .user-option{padding:14px;border-radius:10px;border:1px solid #e5e5e7;margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s}
  .user-option.selected{border-color:#1a56db;background:#e8f0fe;color:#1a56db}
  .user-option:active{background:#f5f5f7}

  .screen{display:none}
  .screen.active{display:block}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">CRM Commercial</div>
    <div class="header-sub"><span class="sync-dot" id="sync-dot"></span><span id="sync-label">Chargement...</span></div>
  </div>
  <div class="user-badge" id="user-badge" onclick="showUserModal()">Choisir commercial</div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="switchTab('leads',this)">Leads</button>
  <button class="nav-btn" onclick="switchTab('detail',this)" id="tab-detail" style="display:none">Fiche</button>
  <button class="nav-btn" onclick="switchTab('stats',this)">Stats</button>
</div>

<!-- LEADS -->
<div id="tab-leads" class="screen active">
  <div class="filters">
    <button class="filter-pill active" onclick="setFilter('tous',this)">Tous</button>
    <button class="filter-pill" onclick="setFilter('Nouveau',this)">Nouveaux</button>
    <button class="filter-pill" onclick="setFilter('Contacté',this)">Contactés</button>
    <button class="filter-pill" onclick="setFilter('Qualifié',this)">Qualifiés</button>
    <button class="filter-pill" onclick="setFilter('Chaud',this)">Chauds</button>
  </div>
  <div class="list" id="leads-list">
    <div class="loading-screen"><div class="spinner"></div>Chargement des leads...</div>
  </div>
</div>

<!-- DETAIL -->
<div id="screen-detail" class="screen">
  <div style="padding:10px 12px">
    <button class="btn" onclick="switchTab('leads',document.querySelectorAll('.nav-btn')[0]);document.getElementById('screen-detail').style.display='none'" style="width:auto;padding:8px 14px;font-size:13px">← Retour</button>
  </div>
  <div id="detail-body" style="padding:0 12px 20px"></div>
</div>

<!-- STATS -->
<div id="tab-stats" class="screen">
  <div class="stats active" id="stats-body">
    <div class="loading-screen"><div class="spinner"></div>Chargement...</div>
  </div>
</div>

<!-- USER MODAL -->
<div class="modal-bg" id="user-modal">
  <div class="modal">
    <div class="modal-title">Quel commercial es-tu ?</div>
    <div class="user-option" onclick="setUser('Dejan')">Dejan</div>
    <div class="user-option" onclick="setUser('Rade')">Rade</div>
    <div class="user-option" onclick="setUser('Tous')">Voir tous les leads</div>
    <button class="btn" style="width:100%;margin-top:4px" onclick="document.getElementById('user-modal').classList.remove('show')">Fermer</button>
  </div>
</div>

<script>
const SHEET_ID = '1Dqqi_mibrN_Jp6do6YoJtpun46uI_c2WlOP-TXZQZjk';
const SHEET_NAME = 'Feuille 1';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

let allLeads = [];
let currentFilter = 'tous';
let currentUser = localStorage.getItem('crm_user') || null;
let selectedLead = null;

const COLS = {nom:0,entreprise:1,email:2,tel:3,source:4,secteur:5,statut:6,commercial:7,action:8,notes:9,score:10,date:11,adresse:12,codepostal:13};

function initUser(){
  if(currentUser){
    document.getElementById('user-badge').textContent = currentUser;
  } else {
    showUserModal();
  }
}

function showUserModal(){
  const m = document.getElementById('user-modal');
  m.classList.add('show');
  document.querySelectorAll('.user-option').forEach(o=>{
    o.classList.toggle('selected', o.textContent === currentUser);
  });
}

function setUser(u){
  currentUser = u;
  localStorage.setItem('crm_user', u);
  document.getElementById('user-badge').textContent = u;
  document.getElementById('user-modal').classList.remove('show');
  renderLeads();
  renderStats();
}

async function loadLeads(){
  setSyncState('loading','Synchronisation...');
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));
    const rows = json.table.rows;
    allLeads = rows.map((r,i)=>{
      const c = r.c;
      const get = (idx) => (c[idx] && c[idx].v !== null && c[idx].v !== undefined) ? String(c[idx].v) : '';
      return {
        rowIndex: i+2,
        nom: get(COLS.nom),
        entreprise: get(COLS.entreprise),
        email: get(COLS.email),
        tel: get(COLS.tel),
        source: get(COLS.source),
        secteur: get(COLS.secteur),
        statut: get(COLS.statut) || 'Nouveau',
        commercial: get(COLS.commercial),
        action: get(COLS.action),
        notes: get(COLS.notes),
        score: get(COLS.score),
        date: get(COLS.date),
        adresse: get(COLS.adresse),
        codepostal: get(COLS.codepostal),
      };
    }).filter(l=>l.nom);
    setSyncState('ok', `${allLeads.length} leads • Synchro OK`);
    renderLeads();
    renderStats();
  } catch(e){
    setSyncState('error','Erreur de connexion');
    document.getElementById('leads-list').innerHTML = `<div class="loading-screen">Impossible de charger les leads.<br><br><button class="btn btn-primary" onclick="loadLeads()" style="margin:0 auto;display:block;width:auto;padding:10px 20px">Réessayer</button></div>`;
  }
}

function setSyncState(state, label){
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state==='loading'?' loading':state==='error'?' error':'');
  document.getElementById('sync-label').textContent = label;
}

function getInitials(nom){
  return nom.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
}

function avatarClass(nom){
  const classes=['av-b','av-t','av-p','av-c'];
  let sum=0; for(let c of nom) sum+=c.charCodeAt(0);
  return classes[sum%classes.length];
}

function badgeClass(s){
  return 'badge b-'+(s||'Nouveau').replace(/\s/g,'-');
}

function renderLeads(){
  let leads = allLeads;
  if(currentUser && currentUser !== 'Tous'){
    leads = leads.filter(l=>!l.commercial || l.commercial===currentUser);
  }
  if(currentFilter !== 'tous'){
    leads = leads.filter(l=>l.statut===currentFilter);
  }
  const el = document.getElementById('leads-list');
  if(!leads.length){
    el.innerHTML = '<div class="loading-screen">Aucun lead dans cette catégorie</div>';
    return;
  }
  el.innerHTML = leads.map((l,i)=>`
    <div class="card" onclick="openDetail('${l.nom.replace(/'/g,"\\'")}')">
      <div class="card-top">
        <div>
          <div class="card-name">${l.nom}</div>
          <div class="card-co">${l.entreprise||l.secteur||'—'}</div>
        </div>
        <span class="${badgeClass(l.statut)}">${l.statut||'Nouveau'}</span>
      </div>
      <div class="card-bot">
        <span class="card-action">${l.action||'Aucune action planifiée'}</span>
        ${l.score?`<span class="card-score">Score ${l.score}</span>`:''}
      </div>
    </div>
  `).join('');
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

function openDetail(nom){
  const l = allLeads.find(x=>x.nom===nom);
  if(!l) return;
  selectedLead = l;
  const av = avatarClass(l.nom);
  const el = document.getElementById('detail-body');
  el.innerHTML = `
    <div class="detail-header">
      <div class="avatar ${av}">${getInitials(l.nom)}</div>
      <div>
        <div class="det-name">${l.nom}</div>
        <div class="det-co">${l.entreprise||'—'}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Coordonnées</div>
      ${l.email?`<div class="field-row"><span class="field-label">Email</span><span class="field-value blue">${l.email}</span></div>`:''}
      ${l.tel?`<div class="field-row"><span class="field-label">Téléphone</span><span class="field-value">${l.tel}</span></div>`:''}
      ${l.adresse?`<div class="field-row"><span class="field-label">Adresse</span><span class="field-value">${l.adresse}</span></div>`:''}
      ${l.codepostal?`<div class="field-row"><span class="field-label">Code postal</span><span class="field-value">${l.codepostal}</span></div>`:''}
      <div class="field-row"><span class="field-label">Source</span><span class="field-value">${l.source||'—'}</span></div>
      <div class="field-row"><span class="field-label">Secteur</span><span class="field-value">${l.secteur||'—'}</span></div>
    </div>

    <div class="section">
      <div class="section-title">Modifier</div>
      <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:4px">Statut</label>
      <select id="edit-statut">
        ${['Nouveau','Contacté','Qualifié','Chaud','Non qualifié'].map(s=>`<option${s===l.statut?' selected':''}>${s}</option>`).join('')}
      </select>
      <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:4px">Assigné à</label>
      <select id="edit-commercial">
        ${['Dejan','Rade'].map(s=>`<option${s===l.commercial?' selected':''}>${s}</option>`).join('')}
      </select>
      <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:4px">Adresse</label>
      <input type="text" id="edit-adresse" value="${l.adresse||''}" placeholder="ex. Rue de la Paix 12">
      <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:4px">Code postal</label>
      <input type="text" id="edit-codepostal" value="${l.codepostal||''}" placeholder="ex. 1200">
      <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:4px">Prochaine action</label>
      <input type="text" id="edit-action" value="${l.action||''}" placeholder="ex. Relance 20/04">
      <label style="font-size:12px;color:#6e6e73;display:block;margin-bottom:4px">Notes</label>
      <textarea id="edit-notes" placeholder="Notes de qualification...">${l.notes||''}</textarea>
      <div class="btn-row">
        <button class="btn" onclick="switchTab('leads',document.querySelectorAll('.nav-btn')[0])">Annuler</button>
        <button class="btn btn-primary" onclick="saveChanges('${l.nom.replace(/'/g,"\\'")}')">Sauvegarder</button>
      </div>
      <div class="toast" id="save-toast"></div>
    </div>
  `;
  document.getElementById('screen-detail').style.display = 'block';
  const tabs = document.querySelectorAll('.nav-btn');
  switchTab('detail', tabs[1]);
}

function saveChanges(nom){
  const l = allLeads.find(x=>x.nom===nom);
  if(!l) return;
  l.statut = document.getElementById('edit-statut').value;
  l.commercial = document.getElementById('edit-commercial').value;
  l.action = document.getElementById('edit-action').value;
  l.notes = document.getElementById('edit-notes').value;
  l.adresse = document.getElementById('edit-adresse').value;
  l.codepostal = document.getElementById('edit-codepostal').value;
  const toast = document.getElementById('save-toast');
  toast.textContent = 'Modifié localement — mets à jour le Sheet manuellement pour sync complète';
  toast.className = 'toast show';
  setTimeout(()=>toast.classList.remove('show'), 3500);
  renderLeads();
  renderStats();
}

function renderStats(){
  let leads = allLeads;
  if(currentUser && currentUser !== 'Tous'){
    leads = leads.filter(l=>!l.commercial||l.commercial===currentUser);
  }
  const total = leads.length;
  const qual = leads.filter(l=>l.statut==='Qualifié'||l.statut==='Chaud').length;
  const signes = leads.filter(l=>l.statut==='Signé').length;
  const nouveaux = leads.filter(l=>l.statut==='Nouveau').length;
  const taux = total ? Math.round(qual/total*100) : 0;
  const upcoming = leads.filter(l=>l.action && l.statut!=='Non qualifié').slice(0,5);

  document.getElementById('stats-body').innerHTML = `
    <div class="metric-grid">
      <div class="metric"><div class="metric-num">${total}</div><div class="metric-lbl">Mes leads</div></div>
      <div class="metric"><div class="metric-num">${taux}%</div><div class="metric-lbl">Taux qualif.</div></div>
      <div class="metric"><div class="metric-num">${signes}</div><div class="metric-lbl">Signés</div></div>
      <div class="metric"><div class="metric-num">${nouveaux}</div><div class="metric-lbl">Nouveaux</div></div>
    </div>
    <div style="font-size:11px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Prochaines actions</div>
    ${upcoming.length ? upcoming.map(l=>`
      <div class="upcoming-card" onclick="openDetail('${l.nom.replace(/'/g,"\\'")}')">
        <div>
          <div class="upcoming-name">${l.nom}</div>
          <div class="upcoming-action">${l.action}</div>
        </div>
        <span class="${badgeClass(l.statut)}">${l.statut}</span>
      </div>
    `).join('') : '<div style="color:#6e6e73;font-size:13px;padding:10px 0">Aucune action planifiée</div>'}
  `;
}

function switchTab(name, btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById('screen-'+name) || document.getElementById('tab-'+name);
  if(el) el.classList.add('active');
}

initUser();
loadLeads();
setInterval(loadLeads, 60000);
</script>
</body>
</html>
