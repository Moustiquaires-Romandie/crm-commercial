<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM Commercial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}

.header{background:#1a56db;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;flex-direction:column}
.header-title{font-size:17px;font-weight:700;color:#fff}
.header-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#34c759;display:inline-block}
.sync-dot.loading{background:#ff9500;animation:pulse 1s infinite}
.sync-dot.error{background:#ff3b30}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-right{display:flex;align-items:center;gap:8px}
.user-badge{background:rgba(255,255,255,.2);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.3)}
.add-btn{background:#fff;color:#1a56db;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none}

.nav{display:flex;background:#fff;border-bottom:1px solid #e5e5e7}
.nav-btn{flex:1;padding:12px 4px;font-size:13px;text-align:center;border:none;background:transparent;color:#6e6e73;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.nav-btn.active{color:#1a56db;border-bottom-color:#1a56db;font-weight:500}

.filters{padding:10px 12px;display:flex;gap:6px;overflow-x:auto;background:#f5f5f7}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid #d1d1d6;background:#fff;color:#6e6e73;cursor:pointer;white-space:nowrap}
.pill.active{background:#1a56db;color:#fff;border-color:#1a56db}

.list{padding:10px 12px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;border:1px solid #e5e5e7}
.card:active{opacity:.8}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.card-name{font-size:15px;font-weight:600;color:#1d1d1f}
.card-co{font-size:13px;color:#6e6e73;margin-top:1px}
.card-bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.card-action{font-size:12px;color:#6e6e73}

.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-Nouveau{background:#e8f0fe;color:#1a56db}
.b-Contact{background:#fff3e0;color:#e65100}
.b-A{background:#f3e8ff;color:#7e22ce}
.b-Perdu{background:#f5f5f5;color:#6e6e73;border:1px solid #e5e5e7}

.detail{padding:12px 12px 40px}
.det-header{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;background:#e8f0fe;color:#1a56db}
.det-name{font-size:17px;font-weight:600;color:#1d1d1f}
.det-co{font-size:13px;color:#6e6e73;margin-top:2px}

.section{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px}
.section-title{font-size:11px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.field-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f2f2f7}
.field-row:last-child{border-bottom:none}
.field-label{font-size:13px;color:#6e6e73}
.field-val{font-size:13px;color:#1d1d1f;text-align:right;max-width:65%}
.field-val.blue{color:#1a56db}

.form-label{font-size:12px;color:#6e6e73;display:block;margin-bottom:4px}
select,textarea,input[type=text],input[type=tel],input[type=email]{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #d1d1d6;background:#f5f5f7;font-size:14px;font-family:inherit;color:#1d1d1f;margin-bottom:10px}
select{appearance:none;-webkit-appearance:none}
select:focus,textarea:focus,input:focus{outline:none;border-color:#1a56db;background:#fff}
textarea{min-height:80px;resize:none}

.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.btn{padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid #d1d1d6;background:#fff;color:#1d1d1f;text-align:center}
.btn.primary{background:#1a56db;color:#fff;border-color:#1a56db}
.btn-back{display:inline-block;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #d1d1d6;background:#fff;color:#1d1d1f;margin:10px 0 0 12px}

.toast{padding:12px 16px;border-radius:10px;text-align:center;font-size:13px;font-weight:500;margin-top:10px;display:none;background:#34c759;color:#fff}
.toast.error{background:#ff3b30}
.toast.show{display:block}

.stats-wrap{padding:12px 12px 40px}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:#fff;border-radius:12px;padding:14px}
.metric-num{font-size:26px;font-weight:700;color:#1d1d1f}
.metric-lbl{font-size:12px;color:#6e6e73;margin-top:2px}

.loading-wrap{padding:40px 20px;text-align:center;color:#6e6e73;font-size:14px}
.spinner{width:28px;height:28px;border:2px solid #e5e5e7;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:14px;color:#1d1d1f}
.user-opt{padding:14px;border-radius:10px;border:1px solid #e5e5e7;margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:500;color:#1d1d1f}
.user-opt.selected{border-color:#1a56db;background:#e8f0fe;color:#1a56db}

.page{display:none}
.page.active{display:block}

.webhook-info{background:#e8f5e9;border-radius:8px;padding:10px 12px;font-size:12px;color:#2e7d32;margin-bottom:10px;line-height:1.5}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">CRM Commercial</div>
    <div class="header-sub"><span class="sync-dot" id="sdot"></span><span id="slabel">Chargement...</span></div>
  </div>
  <div class="header-right">
    <button class="add-btn" onclick="showPage('new')">+ Nouveau</button>
    <div class="user-badge" id="ubadge" onclick="showModal()">Choisir</div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" id="nb-leads" onclick="showPage('leads')">Leads</button>
  <button class="nav-btn" id="nb-detail" onclick="showPage('detail')">Fiche</button>
  <button class="nav-btn" id="nb-stats" onclick="showPage('stats')">Stats</button>
  <button class="nav-btn" id="nb-new" onclick="showPage('new')" style="display:none">+ Nouveau</button>
</div>

<!-- PAGE LEADS -->
<div id="page-leads" class="page active">
  <div class="filters">
    <button class="pill active" onclick="setFilter('tous',this)">Tous</button>
    <button class="pill" onclick="setFilter('Nouveau',this)">Nouveaux</button>
    <button class="pill" onclick="setFilter('Contacté',this)">Contactés</button>
    <button class="pill" onclick="setFilter('A relancer',this)">À relancer</button>
    <button class="pill" onclick="setFilter('Perdu',this)">Perdus</button>
  </div>
  <div class="list" id="leads-list">
    <div class="loading-wrap"><div class="spinner"></div>Chargement des leads...</div>
  </div>
</div>

<!-- PAGE DETAIL -->
<div id="page-detail" class="page">
  <button class="btn-back" onclick="showPage('leads')">← Retour</button>
  <div id="detail-content" class="detail"></div>
</div>

<!-- PAGE NOUVEAU LEAD -->
<div id="page-new" class="page">
  <button class="btn-back" onclick="showPage('leads')">← Retour</button>
  <div class="detail">
    <div class="section">
      <div class="section-title">Nouveau lead</div>
      <label class="form-label">Nom *</label>
      <input type="text" id="n-nom" placeholder="ex. Jean Dupont">
      <label class="form-label">Entreprise</label>
      <input type="text" id="n-entreprise" placeholder="ex. Boulangerie Martin">
      <label class="form-label">Email</label>
      <input type="email" id="n-email" placeholder="contact@exemple.com">
      <label class="form-label">Téléphone</label>
      <input type="tel" id="n-tel" placeholder="+41 79 123 45 67">
      <label class="form-label">Adresse</label>
      <input type="text" id="n-adresse" placeholder="ex. Rue de la Paix 12">
      <label class="form-label">Code postal</label>
      <input type="text" id="n-cp" placeholder="ex. 1200">
      <label class="form-label">Secteur</label>
      <input type="text" id="n-secteur" placeholder="ex. Restauration">
      <label class="form-label">Statut</label>
      <select id="n-statut">
        <option>Nouveau</option>
        <option>Contacté</option>
        <option>A relancer</option>
        <option>Perdu</option>
      </select>
      <label class="form-label">Assigné à</label>
      <select id="n-commercial">
        <option>Dejan</option>
        <option>Rade</option>
      </select>
      <label class="form-label">Prochaine action</label>
      <input type="text" id="n-action" placeholder="ex. Appel découverte 20/04">
      <label class="form-label">Notes</label>
      <textarea id="n-notes" placeholder="Notes de qualification..."></textarea>
      <div class="btn-row">
        <button class="btn" onclick="showPage('leads')">Annuler</button>
        <button class="btn primary" onclick="saveNewLead()">Enregistrer</button>
      </div>
      <div class="toast" id="toast-new"></div>
    </div>
  </div>
</div>

<!-- PAGE STATS -->
<div id="page-stats" class="page">
  <div class="stats-wrap" id="stats-content">
    <div class="loading-wrap"><div class="spinner"></div>Chargement...</div>
  </div>
</div>

<!-- MODAL COMMERCIAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">Quel commercial es-tu ?</div>
    <div class="user-opt" onclick="setUser('Dejan')">Dejan</div>
    <div class="user-opt" onclick="setUser('Rade')">Rade</div>
    <div class="user-opt" onclick="setUser('Tous')">Voir tous les leads</div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="document.getElementById('modal').classList.remove('show')">Fermer</button>
  </div>
</div>

<script>
const SHEET_ID = '1Dqqi_mibrN_Jp6do6YoJtpun46uI_c2WlOP-TXZQZjk';
const SHEET_NAME = 'Feuille 1';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

// 👉 Remplace par ton URL webhook Make une fois configuré
const MAKE_WEBHOOK = 'https://hook.eu1.make.com/rw4zw4qcqo5l25cw7mkcxx7d3brbmt89';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySVrvV9cVRBZ1g1QCuo6isn2GIdzsymU_3m-fNuqwS6Xui51KNo_acE5P4d5l2bxmXhg/exec';

const STATUTS = ['Nouveau','Contacté','A relancer','Perdu'];

let leads = [];
let filter = 'tous';
let user = localStorage.getItem('crm_user') || null;

function syncState(s, label) {
  const d = document.getElementById('sdot');
  d.className = 'sync-dot' + (s === 'loading' ? ' loading' : s === 'error' ? ' error' : '');
  document.getElementById('slabel').textContent = label;
}

async function loadLeads() {
  syncState('loading', 'Synchronisation...');
  try {
    const r = await fetch(SHEET_URL);
    const t = await r.text();
    const start = t.indexOf('{');
    const end = t.lastIndexOf('}') + 1;
    const j = JSON.parse(t.substring(start, end));
    const rows = j.table.rows;
    leads = rows.map((r, i) => {
      const c = r.c;
      const g = idx => (c && c[idx] && c[idx].v !== null && c[idx].v !== undefined) ? String(c[idx].v) : '';
      return {
        i: i + 2,
        nom: g(0), entreprise: g(1), email: g(2), tel: g(3),
        source: g(4), secteur: g(5), statut: g(6) || 'Nouveau',
        commercial: g(7), action: g(8), notes: g(9),
        score: g(10), date: g(11), adresse: g(12), cp: g(13)
      };
    }).filter(l => l.nom);
    syncState('ok', `${leads.length} leads • Synchro OK`);
    renderLeads();
    renderStats();
  } catch(e) {
    syncState('error', 'Erreur de connexion');
    document.getElementById('leads-list').innerHTML = '<div class="loading-wrap">Impossible de charger.<br><br><button class="btn primary" onclick="loadLeads()" style="width:auto;margin:0 auto;display:block;padding:10px 20px">Réessayer</button></div>';
  }
}

function initUser() {
  if (user) {
    document.getElementById('ubadge').textContent = user;
  } else {
    showModal();
  }
}

function showModal() {
  document.getElementById('modal').classList.add('show');
  document.querySelectorAll('.user-opt').forEach(o => {
    o.classList.toggle('selected', o.textContent === user);
  });
}

function setUser(u) {
  user = u;
  localStorage.setItem('crm_user', u);
  document.getElementById('ubadge').textContent = u;
  document.getElementById('modal').classList.remove('show');
  renderLeads();
  renderStats();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const nb = document.getElementById('nb-' + name);
  if (nb) nb.classList.add('active');
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

function badgeClass(s) {
  if (!s) return 'badge b-Nouveau';
  if (s === 'Contacté') return 'badge b-Contact';
  if (s === 'A relancer') return 'badge b-A';
  if (s === 'Perdu') return 'badge b-Perdu';
  return 'badge b-Nouveau';
}

function initials(nom) {
  return nom.split(' ').map(w => w[0] || '').join('').substring(0, 2).toUpperCase();
}

function renderLeads() {
  let list = leads;
  if (user && user !== 'Tous') {
    list = list.filter(l => !l.commercial || l.commercial === user);
  }
  if (filter !== 'tous') {
    list = list.filter(l => l.statut === filter);
  }
  const el = document.getElementById('leads-list');
  if (!list.length) {
    el.innerHTML = '<div class="loading-wrap">Aucun lead dans cette catégorie.</div>';
    return;
  }
  el.innerHTML = list.map(l => `
    <div class="card" onclick="openDetail(${l.i})">
      <div class="card-top">
        <div>
          <div class="card-name">${l.nom}</div>
          <div class="card-co">${l.entreprise || l.secteur || '—'}</div>
        </div>
        <span class="${badgeClass(l.statut)}">${l.statut}</span>
      </div>
      <div class="card-bot">
        <span class="card-action">${l.action || 'Aucune action planifiée'}</span>
        ${l.score ? `<span style="font-size:12px;color:#6e6e73">Score ${l.score}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function openDetail(rowIndex) {
  const l = leads.find(x => x.i === rowIndex);
  if (!l) return;
  const el = document.getElementById('detail-content');
  el.innerHTML = `
    <div class="det-header">
      <div class="avatar">${initials(l.nom)}</div>
      <div>
        <div class="det-name">${l.nom}</div>
        <div class="det-co">${l.entreprise || '—'}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Coordonnées</div>
      ${l.email ? `<div class="field-row"><span class="field-label">Email</span><span class="field-val blue">${l.email}</span></div>` : ''}
      ${l.tel ? `<div class="field-row"><span class="field-label">Téléphone</span><span class="field-val">${l.tel}</span></div>` : ''}
      ${l.adresse ? `<div class="field-row"><span class="field-label">Adresse</span><span class="field-val">${l.adresse}</span></div>` : ''}
      ${l.cp ? `<div class="field-row"><span class="field-label">Code postal</span><span class="field-val">${l.cp}</span></div>` : ''}
      <div class="field-row"><span class="field-label">Source</span><span class="field-val">${l.source || '—'}</span></div>
      <div class="field-row"><span class="field-label">Secteur</span><span class="field-val">${l.secteur || '—'}</span></div>
    </div>
    <div class="section">
      <div class="section-title">Modifier</div>
      <label class="form-label">Statut</label>
      <select id="e-statut">
        ${STATUTS.map(s => `<option${s === l.statut ? ' selected' : ''}>${s}</option>`).join('')}
      </select>
      <label class="form-label">Assigné à</label>
      <select id="e-commercial">
        ${['Dejan','Rade'].map(s => `<option${s === l.commercial ? ' selected' : ''}>${s}</option>`).join('')}
      </select>
      <label class="form-label">Adresse</label>
      <input type="text" id="e-adresse" value="${l.adresse || ''}" placeholder="ex. Rue de la Paix 12">
      <label class="form-label">Code postal</label>
      <input type="text" id="e-cp" value="${l.cp || ''}" placeholder="ex. 1200">
      <label class="form-label">Prochaine action</label>
      <input type="text" id="e-action" value="${l.action || ''}" placeholder="ex. Relance 20/04">
      <label class="form-label">Notes</label>
      <textarea id="e-notes" placeholder="Notes de qualification...">${l.notes || ''}</textarea>
      <div class="btn-row">
        <button class="btn" onclick="showPage('leads')">Annuler</button>
        <button class="btn primary" onclick="saveChanges(${rowIndex})">Sauvegarder</button>
      </div>
      <div class="toast" id="toast-detail"></div>
    </div>
  `;
  showPage('detail');
}

function saveChanges(rowIndex) {
  const l = leads.find(x => x.i === rowIndex);
  if (!l) return;
  l.statut = document.getElementById('e-statut').value;
  l.commercial = document.getElementById('e-commercial').value;
  l.adresse = document.getElementById('e-adresse').value;
  l.cp = document.getElementById('e-cp').value;
  l.action = document.getElementById('e-action').value;
  l.notes = document.getElementById('e-notes').value;
  showToast('toast-detail', 'Modifications sauvegardées !', false);
  renderLeads();
  renderStats();
}

async function saveNewLead() {
  const nom = document.getElementById('n-nom').value.trim();
  if (!nom) {
    showToast('toast-new', 'Le nom est obligatoire', true);
    return;
  }
  const data = {
    nom, 
    entreprise: document.getElementById('n-entreprise').value,
    email: document.getElementById('n-email').value,
    tel: document.getElementById('n-tel').value,
    adresse: document.getElementById('n-adresse').value,
    cp: document.getElementById('n-cp').value,
    secteur: document.getElementById('n-secteur').value,
    statut: document.getElementById('n-statut').value,
    commercial: document.getElementById('n-commercial').value,
    action: document.getElementById('n-action').value,
    notes: document.getElementById('n-notes').value,
    source: 'Manuel',
    date: new Date().toLocaleDateString('fr-CH')
  };

  // Ajouter localement
  const newLead = { ...data, i: Date.now(), score: '' };
  leads.unshift(newLead);
  renderLeads();
  renderStats();

  // Envoyer à Google Apps Script
  try {
    const params = new URLSearchParams(data).toString();
    await fetch(APPS_SCRIPT_URL + '?' + params, { mode: 'no-cors' });
    showToast('toast-new', 'Lead ajouté et synchronisé dans Google Sheets !', false);
  } catch(e) {
    showToast('toast-new', 'Lead ajouté localement', false);
  }

  // Vider le formulaire
  ['n-nom','n-entreprise','n-email','n-tel','n-adresse','n-cp','n-secteur','n-action','n-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });

  setTimeout(() => showPage('leads'), 1500);
}

function showToast(id, msg, isError) {
  const t = document.getElementById(id);
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function renderStats() {
  let list = leads;
  if (user && user !== 'Tous') {
    list = list.filter(l => !l.commercial || l.commercial === user);
  }
  const total = list.length;
  const contactes = list.filter(l => l.statut === 'Contacté').length;
  const aRelancer = list.filter(l => l.statut === 'A relancer').length;
  const perdus = list.filter(l => l.statut === 'Perdu').length;
  const nouveaux = list.filter(l => l.statut === 'Nouveau').length;
  const upcoming = list.filter(l => l.action && l.statut !== 'Perdu').slice(0, 5);

  document.getElementById('stats-content').innerHTML = `
    <div class="metric-grid">
      <div class="metric"><div class="metric-num">${total}</div><div class="metric-lbl">Total leads</div></div>
      <div class="metric"><div class="metric-num">${nouveaux}</div><div class="metric-lbl">Nouveaux</div></div>
      <div class="metric"><div class="metric-num">${contactes}</div><div class="metric-lbl">Contactés</div></div>
      <div class="metric"><div class="metric-num">${aRelancer}</div><div class="metric-lbl">À relancer</div></div>
    </div>
    <div style="font-size:11px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Prochaines actions</div>
    ${upcoming.length ? upcoming.map(l => `
      <div class="card" onclick="openDetail(${l.i})">
        <div class="card-top">
          <div><div class="card-name">${l.nom}</div><div class="card-co">${l.action}</div></div>
          <span class="${badgeClass(l.statut)}">${l.statut}</span>
        </div>
      </div>
    `).join('') : '<div style="color:#6e6e73;font-size:13px;padding:10px 0">Aucune action planifiée</div>'}
  `;
}

initUser();
loadLeads();
setInterval(loadLeads, 60000);
</script>
</body>
</html>
